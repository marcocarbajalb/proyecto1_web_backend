# fly.toml app configuration file generated for proyecto1-web-backend on 2026-04-21T11:58:03-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'proyecto1-web-backend'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "seriestracker_data"
  destination = "/data"

[env]
  DB_PATH = "/data/series.db"
  UPLOADS_DIR = "/data/uploads"
  ALLOWED_ORIGIN = "https://tracker-de-series.vercel.app"
